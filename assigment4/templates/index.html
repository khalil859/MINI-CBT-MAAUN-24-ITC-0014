
<!DOCTYPE html>
<html>
<head>
    <title>Mini CBT</title>
</head>
<body>
    <h2>Answer the Questions</h2>

    <form action="/submit" method="POST">
        {% for q in questions %}
            <p>{{ loop.index }}. {{ q.text }}</p>
            <input type="text" name="q{{ loop.index0 }}" required>
            <br><br>
        {% endfor %}

        <button type="submit">Submit</button>
    </form>
</body>
</html>
